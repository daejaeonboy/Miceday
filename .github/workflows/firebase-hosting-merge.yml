name: Deploy Miceday to Firebase Hosting

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build_and_preview:
    name: Preview deploy for miceday.co.kr
    if: "${{ github.event_name == 'pull_request' }}"
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: human-partner
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUMAN_PARTNER }}"
          projectId: ${{ env.FIREBASE_PROJECT_ID }}

  build_and_deploy:
    name: Live deploy for miceday.co.kr
    if: "${{ github.event_name == 'push' }}"
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: human-partner
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUMAN_PARTNER }}"
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          channelId: live
